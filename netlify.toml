[build]
    command = "pnpm run build"
    publish = "build/"

[build.environment]
    NODE_VERSION = "22"
    COREPACK_INTEGRITY_KEYS = "0"

[[headers]]
    for = "/favicon.png"
    [headers.values]
        Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
    for = "/favicon.svg"
    [headers.values]
        Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
    for = "/_app/immutable/*"
    [headers.values]
        Cache-Control = "public, max-age=31536000, immutable"
